<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dominó Suizo – Parejas</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { margin: 0; background: #0b1220; color: #e8eefc; }
    header { padding: 16px 18px; background: #121a2b; border-bottom: 1px solid #22304f; }
    header h1 { margin: 0 0 8px; font-size: 18px; }
    .header-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    main { padding: 16px 18px; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
    .card { background: #121a2b; border: 1px solid #22304f; border-radius: 14px; padding: 14px; }
    .card h2 { margin: 0 0 10px; font-size: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #22304f; padding: 10px; text-align: left; font-size: 13px; }
    th { background: #0f1830; }
    tr.top3 td:first-child { font-weight: bold; color: #ffd700; }
    .muted { color: #9fb1db; font-size: 12px; }
    .pill { display: inline-block; padding: 3px 8px; border: 1px solid #22304f; border-radius: 999px; font-size: 12px; color: #cfe0ff; }
    .flex-between { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .matches { display: flex; flex-direction: column; gap: 10px; }
    .match { border: 1px solid #22304f; border-radius: 12px; padding: 12px; background: #0f1830; }
    .mesa-label { color: #9fb1db; font-size: 12px; margin-bottom: 6px; }
    .teams { display: flex; flex-direction: column; gap: 6px; }
    .team-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .team-name { font-size: 14px; font-weight: bold; }
    .team-score { font-size: 20px; font-weight: bold; color: #7ea8ff; min-width: 40px; text-align: right; }
    .team-score.winner { color: #6fcf6f; }
    .vs-line { text-align: center; color: #9fb1db; font-size: 11px; margin: 2px 0; }
    .pending { color: #9fb1db; font-size: 13px; font-style: italic; }
    .refresh-note { color: #9fb1db; font-size: 11px; }
    .no-data { text-align: center; padding: 40px 20px; color: #9fb1db; }
    .no-data .big { font-size: 40px; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>🁫 Dominó Suizo – Parejas</h1>
  <div class="header-row">
    <span class="pill" id="roundPill">Ronda: –</span>
    <span class="refresh-note" id="refreshNote">Actualiza cada 15s</span>
  </div>
</header>

<main>

  <div class="card" id="matchesCard">
    <div class="flex-between" style="margin-bottom:10px;">
      <h2 id="matchesTitle">Ronda actual</h2>
    </div>
    <div class="matches" id="matches">
      <div class="no-data"><div class="big">🁫</div>Esperando que el árbitro inicie el torneo…</div>
    </div>
  </div>

  <div class="card">
    <div class="flex-between" style="margin-bottom:10px;">
      <h2>Posiciones</h2>
      <span class="muted">Ganadas → Puntos → DIF</span>
    </div>
    <div style="overflow:auto; border-radius:12px; border:1px solid #22304f;">
      <table>
        <thead>
          <tr><th>#</th><th>Pareja</th><th>PJ</th><th>G</th><th>P</th><th>PF</th><th>PC</th><th>DIF</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
const STORAGE_KEY = "domino_parejas_v2";
const MAX_ROUNDS = 5;

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch { return null; }
}

function standings(pairs, rounds) {
  const m = new Map(pairs.map(p => [p, { p, PJ:0, G:0, P:0, PF:0, PC:0 }]));
  for (const r of rounds) {
    if (!m.has(r.pA) || !m.has(r.pB)) continue;
    m.get(r.pA).PJ++; m.get(r.pB).PJ++;
    const a = Number(r.ptsA), b = Number(r.ptsB);
    if (!Number.isFinite(a) || !Number.isFinite(b) || a === b) continue;
    if (a > b) { m.get(r.pA).G++; m.get(r.pB).P++; }
    else        { m.get(r.pB).G++; m.get(r.pA).P++; }
    m.get(r.pA).PF += a; m.get(r.pA).PC += b;
    m.get(r.pB).PF += b; m.get(r.pB).PC += a;
  }
  return [...m.values()]
    .map(r => ({ ...r, DIF: r.PF - r.PC }))
    .sort((x, y) =>
      y.G !== x.G ? y.G - x.G :
      y.PF !== x.PF ? y.PF - x.PF :
      y.DIF !== x.DIF ? y.DIF - x.DIF :
      x.p.localeCompare(y.p)
    );
}

function render() {
  const d = load();
  const now = new Date();
  document.getElementById("refreshNote").textContent =
    `Actualizado: ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  if (!d || !d.pairs || d.pairs.length === 0) {
    document.getElementById("roundPill").textContent = "Ronda: –";
    document.getElementById("matches").innerHTML =
      `<div class="no-data"><div class="big">🁫</div>Esperando que el árbitro inicie el torneo…</div>`;
    document.getElementById("tableBody").innerHTML = "";
    return;
  }

  const rn = d.rounds.reduce((m, r) => Math.max(m, r.round), 0);
  document.getElementById("roundPill").textContent = `Ronda: ${rn}/${MAX_ROUNDS}`;
  document.getElementById("matchesTitle").textContent = rn > 0 ? `Ronda ${rn}` : "Sin rondas aún";

  // Mesas
  const matchesEl = document.getElementById("matches");
  matchesEl.innerHTML = "";

  if (rn === 0) {
    matchesEl.innerHTML = `<div class="muted">El árbitro aún no generó la primera ronda.</div>`;
  } else {
    // Banco
    if (d.lastBench && d.lastBench.round === rn && d.lastBench.pairs && d.lastBench.pairs.length) {
      const bench = document.createElement("div");
      bench.className = "muted"; bench.style.marginBottom = "8px";
      bench.innerHTML = `<span class="pill">Banco</span> ${d.lastBench.pairs.map(esc).join(", ")} — descansa esta ronda`;
      matchesEl.appendChild(bench);
    }

    const ms = d.rounds.filter(r => r.round === rn).sort((a, b) => a.table - b.table);
    for (const m of ms) {
      const a = Number(m.ptsA), b = Number(m.ptsB);
      const hasScores = m.ptsA !== "" && m.ptsB !== "" && Number.isFinite(a) && Number.isFinite(b);
      const aWins = hasScores && a > b;
      const bWins = hasScores && b > a;

      const div = document.createElement("div");
      div.className = "match";
      div.innerHTML = `
        <div class="mesa-label">Mesa ${m.table}</div>
        <div class="teams">
          <div class="team-row">
            <span class="team-name">${esc(m.pA)}</span>
            <span class="team-score ${aWins ? 'winner' : ''}">${hasScores ? a : '—'}</span>
          </div>
          <div class="vs-line">vs</div>
          <div class="team-row">
            <span class="team-name">${esc(m.pB)}</span>
            <span class="team-score ${bWins ? 'winner' : ''}">${hasScores ? b : '—'}</span>
          </div>
          ${!hasScores ? `<div class="pending">En juego…</div>` : ''}
        </div>
      `;
      matchesEl.appendChild(div);
    }
  }

  // Tabla
  const rows = standings(d.pairs, d.rounds);
  const tb = document.getElementById("tableBody");
  tb.innerHTML = "";
  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    if (i < 3) tr.className = "top3";
    tr.innerHTML = `<td>${i+1}</td><td><b>${esc(r.p)}</b></td><td>${r.PJ}</td><td>${r.G}</td><td>${r.P}</td><td>${r.PF}</td><td>${r.PC}</td><td>${r.DIF}</td>`;
    tb.appendChild(tr);
  });
}

render();
setInterval(render, 15000);
</script>
</body>
</html>
