<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Partida de Dominó</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0b1220; color: #e8eefc; min-height: 100vh; }

    header {
      padding: 14px 18px; background: #121a2b;
      border-bottom: 1px solid #22304f;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    }
    header h1 { margin: 0; font-size: 17px; }

    #timerBox { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    #timerDisplay {
      font-size: 28px; font-weight: bold; font-variant-numeric: tabular-nums;
      color: #e8eefc; letter-spacing: 2px; min-width: 80px;
    }
    #timerDisplay.warning { color: #ffa940; }
    #timerDisplay.danger  { color: #ff4d4d; animation: pulse .8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .btn { border: 0; border-radius: 10px; padding: 9px 14px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-blue  { background: #2b65ff; color: #fff; }
    .btn-gray  { background: #1b2847; color: #cfe0ff; border: 1px solid #22304f; }
    .btn-green { background: #1a7a1a; color: #fff; }
    .btn-red   { background: #d12b2b; color: #fff; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Config */
    #configRow {
      display: flex; gap: 10px; align-items: center; justify-content: center;
      padding: 10px 18px; flex-wrap: wrap; border-bottom: 1px solid #22304f;
    }
    #configRow label { font-size: 13px; color: #9fb1db; }
    .cfg-input {
      background: #0b1220; color: #e8eefc; border: 1px solid #22304f;
      border-radius: 8px; padding: 6px 10px; font-size: 14px; width: 70px; text-align: center;
    }

    /* Marcador */
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      max-width: 700px; margin: 16px auto 0; padding: 0 12px; gap: 0;
    }
    .team-panel {
      background: #121a2b; border: 1px solid #22304f; border-radius: 14px;
      padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .team-label { font-size: 12px; color: #9fb1db; text-transform: uppercase; letter-spacing: 1px; }
    .team-name-input {
      background: transparent; border: none; border-bottom: 1px solid #22304f;
      color: #e8eefc; font-size: 18px; font-weight: bold; text-align: center;
      width: 100%; outline: none; padding: 4px 0;
    }
    .score-display {
      font-size: 72px; font-weight: 900; line-height: 1; color: #e8eefc; text-align: center; min-width: 100px;
    }
    .score-display.winning { color: #6fcf6f; }
    .score-display.losing  { color: #9fb1db; }
    .progress-bar-bg { width: 100%; height: 10px; background: #0b1220; border-radius: 99px; overflow: hidden; border: 1px solid #22304f; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: #2b65ff; transition: width .3s; }
    .progress-bar-fill.winning { background: #6fcf6f; }
    .add-row { display: flex; gap: 6px; align-items: center; width: 100%; }
    .add-row input {
      flex: 1; background: #0b1220; color: #e8eefc; border: 1px solid #22304f;
      border-radius: 8px; padding: 9px 10px; font-size: 16px; text-align: center; min-width: 0;
    }
    .vs-col { display: flex; align-items: center; justify-content: center; padding: 0 10px; font-size: 20px; font-weight: bold; color: #22304f; }

    /* Historial */
    .history-section { max-width: 700px; margin: 14px auto; padding: 0 12px 20px; }
    .history-card { background: #121a2b; border: 1px solid #22304f; border-radius: 14px; padding: 14px; }
    .history-card h3 { margin: 0 0 10px; font-size: 14px; color: #9fb1db; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th { background: #0f1830; padding: 8px 10px; text-align: center; color: #9fb1db; font-weight: 600; border-bottom: 1px solid #22304f; }
    .history-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #1a2540; }
    .history-table tr:last-child td { border-bottom: none; }
    .mano-num { color: #9fb1db; }
    .pts-winner { color: #6fcf6f; font-weight: bold; }
    .pts-zero { color: #9fb1db; }
    .total-col { color: #cfe0ff; }
    .empty-history { font-size: 12px; color: #9fb1db; text-align: center; padding: 16px 0; }

    /* Edición inline de mano */
    .edit-input {
      width: 60px; background: #0b1220; color: #e8eefc;
      border: 1px solid #2b65ff; border-radius: 6px;
      padding: 4px 6px; font-size: 13px; text-align: center;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer; padding: 2px 5px;
      font-size: 15px; border-radius: 6px; color: #9fb1db;
    }
    .icon-btn:hover { background: #1b2847; }
    .icon-btn.del { color: #ff6b6b; }
    .icon-btn.save { color: #6fcf6f; }

    /* Banner ganador */
    #winBanner {
      display: none; padding: 14px 18px;
      background: #1a3a1a; border-bottom: 2px solid #2d6e2d;
      text-align: center; font-size: 15px; font-weight: bold; color: #6fcf6f;
    }
    #winBanner.show { display: block; }
    #winBanner button { margin-left: 14px; background: #0b1220; border: 1px solid #2d6e2d; color: #6fcf6f; border-radius: 8px; padding: 4px 12px; cursor: pointer; font-size: 13px; }

    /* Modal */
    #winModal { display: none; }  </style>
</head>
<body>

<div id="winBanner"></div>
<header>
  <h1>🁫 Partida de Dominó</h1>
  <div id="timerBox">
    <div id="timerDisplay">--:--</div>
    <button class="btn btn-green" id="btnStart">▶ Iniciar</button>
    <button class="btn btn-gray"  id="btnPause" disabled>⏸ Pausa</button>
    <button class="btn btn-red"   id="btnReset">↺ Reiniciar</button>
  </div>
</header>

<div id="configRow">
  <label>Tiempo límite (min):</label>
  <input type="number" class="cfg-input" id="timeInput" value="30" min="1" max="120" />
  <span style="font-size:12px;color:#9fb1db;">· Meta: <b>200 pts</b></span>
</div>

<div class="scoreboard">
  <!-- LOCAL -->
  <div class="team-panel">
    <div class="team-label">Local</div>
    <input class="team-name-input" id="nameHome" value="Local" maxlength="16" />
    <div class="score-display" id="scoreHome">0</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="barHome" style="width:0%"></div></div>
    <div class="add-row">
      <input type="number" id="inputHome" placeholder="Pts" min="1" max="999" />
      <button class="btn btn-blue" id="btnAddHome">+</button>
    </div>
  </div>

  <div class="vs-col">VS</div>

  <!-- VISITANTE -->
  <div class="team-panel">
    <div class="team-label">Visitante</div>
    <input class="team-name-input" id="nameVisitor" value="Visitante" maxlength="16" />
    <div class="score-display" id="scoreVisitor">0</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="barVisitor" style="width:0%"></div></div>
    <div class="add-row">
      <input type="number" id="inputVisitor" placeholder="Pts" min="1" max="999" />
      <button class="btn btn-blue" id="btnAddVisitor">+</button>
    </div>
  </div>
</div>

<!-- Historial -->
<div class="history-section">
  <div class="history-card">
    <h3>Historial de manos (<span id="manoCount">0</span>)</h3>
    <div style="overflow:auto;max-height:280px;">
      <table class="history-table">
        <thead>
          <tr>
            <th>#</th>
            <th id="thHome">Local</th>
            <th id="thVisitor">Visitante</th>
            <th>Total L</th>
            <th>Total V</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="6" class="empty-history">Sin manos aún.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="winModal"></div>

<script>
const GOAL = 200;

const S = {
  home: 0, visitor: 0,
  manos: [],
  running: false,
  elapsed: 0,
  limitSecs: 30 * 60
};

let ticker = null;
let editingIdx = null; // índice de mano siendo editada

/* ---- refs ---- */
const $ = id => document.getElementById(id);
const el = {
  timerDisplay: $("timerDisplay"),
  btnStart:  $("btnStart"),  btnPause: $("btnPause"), btnReset: $("btnReset"),
  timeInput: $("timeInput"),
  scoreHome: $("scoreHome"), scoreVisitor: $("scoreVisitor"),
  barHome:   $("barHome"),   barVisitor:   $("barVisitor"),
  nameHome:  $("nameHome"),  nameVisitor:  $("nameVisitor"),
  inputHome: $("inputHome"), inputVisitor: $("inputVisitor"),
  btnAddHome: $("btnAddHome"), btnAddVisitor: $("btnAddVisitor"),
  historyBody: $("historyBody"), manoCount: $("manoCount"),
  thHome: $("thHome"), thVisitor: $("thVisitor"),
  winBanner: $("winBanner"),
};

/* ---- timer ---- */
function fmt(s) {
  return `${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
}
function updateTimer() {
  const rem = S.limitSecs - S.elapsed;
  el.timerDisplay.textContent = S.running || S.elapsed > 0 ? fmt(Math.max(0, rem)) : "--:--";
  el.timerDisplay.className = rem <= 60 ? "danger" : rem <= 180 ? "warning" : "";
}
function startTimer() {
  S.limitSecs = parseInt(el.timeInput.value || 30) * 60;
  S.running = true;
  el.btnStart.disabled = true;
  el.btnPause.disabled = false;
  el.timeInput.disabled = true;
  ticker = setInterval(() => {
    S.elapsed++;
    updateTimer();
    if (S.elapsed >= S.limitSecs) { clearInterval(ticker); S.running = false; notifyTime(); }
  }, 1000);
}
function pauseTimer() {
  clearInterval(ticker); S.running = false;
  el.btnStart.disabled = false; el.btnStart.textContent = "▶ Continuar"; el.btnPause.disabled = true;
}
function resetGame() {
  if ((S.home || S.visitor || S.elapsed) && !confirm("¿Reiniciar la partida?")) return;
  clearInterval(ticker);
  Object.assign(S, { home:0, visitor:0, manos:[], running:false, elapsed:0, limitSecs: parseInt(el.timeInput.value||30)*60 });
  editingIdx = null;
  el.timeInput.disabled = false; el.btnStart.disabled = false; el.btnStart.textContent = "▶ Iniciar";
  el.btnPause.disabled = true; el.winBanner.classList.remove("show"); el.winBanner.innerHTML = "";
  render();
}

/* ---- puntos ---- */
function addPoints(team, ptsRaw) {
  const pts = parseInt(ptsRaw);
  if (!pts || pts <= 0) return;
  S[team] += pts;
  S.manos.push({ home: team === "home" ? pts : 0, visitor: team === "visitor" ? pts : 0 });
  render();
  if (S[team] >= GOAL) notifyScore(team);
}

function deleteMano(idx) {
  const m = S.manos[idx];
  S.home    -= m.home;
  S.visitor -= m.visitor;
  if (S.home < 0)    S.home = 0;
  if (S.visitor < 0) S.visitor = 0;
  S.manos.splice(idx, 1);
  editingIdx = null;
  el.winBanner.classList.remove("show");
  render();
}

function saveManoEdit(idx, newHome, newVisitor) {
  const old = S.manos[idx];
  S.home    += newHome    - old.home;
  S.visitor += newVisitor - old.visitor;
  if (S.home < 0)    S.home = 0;
  if (S.visitor < 0) S.visitor = 0;
  S.manos[idx] = { home: newHome, visitor: newVisitor };
  editingIdx = null;
  el.winBanner.classList.remove("show");
  render();
}

/* ---- notificaciones (no bloquean nada) ---- */
function showBanner(msg) {
  el.winBanner.innerHTML = msg + `<button onclick="resetGame()">Nueva partida</button>`;
  el.winBanner.classList.add("show");
}
function notifyScore(team) {
  playAlarm();
  const name  = team === "home" ? el.nameHome.value : el.nameVisitor.value;
  const loser = team === "home" ? el.nameVisitor.value : el.nameHome.value;
  const lpts  = S[team === "home" ? "visitor" : "home"];
  showBanner(`🏆 ¡Gana ${name} con ${S[team]} pts! — ${loser} quedó con ${lpts} pts.`);
}
function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.6, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.25);
    });
  } catch {}
}

function notifyTime() {
  playAlarm();
  el.btnStart.disabled = false;
  el.btnPause.disabled = true;
  el.btnStart.textContent = "▶ Reiniciar tiempo";
  if (S.home > S.visitor)      showBanner(`⏱ Tiempo agotado — 🏆 Gana ${el.nameHome.value} (${S.home} vs ${S.visitor} pts)`);
  else if (S.visitor > S.home) showBanner(`⏱ Tiempo agotado — 🏆 Gana ${el.nameVisitor.value} (${S.visitor} vs ${S.home} pts)`);
  else                         showBanner(`⏱ Tiempo agotado — 🤝 Empate (${S.home} pts)`);
}

/* ---- render ---- */
function render() {
  el.scoreHome.textContent    = S.home;
  el.scoreVisitor.textContent = S.visitor;
  el.scoreHome.className    = "score-display" + (S.home > S.visitor ? " winning" : S.home < S.visitor ? " losing" : "");
  el.scoreVisitor.className = "score-display" + (S.visitor > S.home ? " winning" : S.visitor < S.home ? " losing" : "");
  el.barHome.style.width    = Math.min(100, S.home    / GOAL * 100) + "%";
  el.barVisitor.style.width = Math.min(100, S.visitor / GOAL * 100) + "%";
  el.barHome.className    = "progress-bar-fill" + (S.home    >= GOAL ? " winning" : "");
  el.barVisitor.className = "progress-bar-fill" + (S.visitor >= GOAL ? " winning" : "");
  el.btnAddHome.disabled    = false;
  el.btnAddVisitor.disabled = false;
  updateTimer();
  renderHistory();
}

function renderHistory() {
  el.thHome.textContent    = el.nameHome.value    || "Local";
  el.thVisitor.textContent = el.nameVisitor.value || "Visitante";
  el.manoCount.textContent = S.manos.length;

  if (!S.manos.length) {
    el.historyBody.innerHTML = `<tr><td colspan="6" class="empty-history">Sin manos aún.</td></tr>`;
    return;
  }

  let totalH = 0, totalV = 0;
  const rows = S.manos.map((m, i) => {
    totalH += m.home; totalV += m.visitor;
    const tH = totalH, tV = totalV; // snapshot para esta fila

    if (editingIdx === i) {
      return `<tr style="background:#1a1f30;">
        <td class="mano-num">${i+1}</td>
        <td><input class="edit-input" id="editH" type="number" min="0" value="${m.home}" /></td>
        <td><input class="edit-input" id="editV" type="number" min="0" value="${m.visitor}" /></td>
        <td class="total-col">${tH}</td>
        <td class="total-col">${tV}</td>
        <td>
          <button class="icon-btn save" onclick="commitEdit(${i})">✓</button>
          <button class="icon-btn" onclick="editingIdx=null;render()">✕</button>
        </td>
      </tr>`;
    }

    return `<tr>
      <td class="mano-num">${i+1}</td>
      <td class="${m.home > 0 ? 'pts-winner' : 'pts-zero'}">${m.home > 0 ? '+'+m.home : '—'}</td>
      <td class="${m.visitor > 0 ? 'pts-winner' : 'pts-zero'}">${m.visitor > 0 ? '+'+m.visitor : '—'}</td>
      <td class="total-col">${tH}</td>
      <td class="total-col">${tV}</td>
      <td>
        <button class="icon-btn" title="Editar" onclick="editingIdx=${i};render()">✏️</button>
        <button class="icon-btn del" title="Eliminar" onclick="deleteMano(${i})">🗑</button>
      </td>
    </tr>`;
  });

  // más reciente arriba
  el.historyBody.innerHTML = rows.slice().reverse().join("");
}

function commitEdit(idx) {
  const h = parseInt($("editH").value) || 0;
  const v = parseInt($("editV").value) || 0;
  saveManoEdit(idx, h, v);
}

/* ---- eventos ---- */
el.btnStart.addEventListener("click", startTimer);
el.btnPause.addEventListener("click", pauseTimer);
el.btnReset.addEventListener("click", resetGame);

el.btnAddHome.addEventListener("click", () => { addPoints("home", el.inputHome.value); el.inputHome.value = ""; el.inputHome.focus(); });
el.btnAddVisitor.addEventListener("click", () => { addPoints("visitor", el.inputVisitor.value); el.inputVisitor.value = ""; el.inputVisitor.focus(); });
el.inputHome.addEventListener("keydown",    e => { if (e.key === "Enter") el.btnAddHome.click(); });
el.inputVisitor.addEventListener("keydown", e => { if (e.key === "Enter") el.btnAddVisitor.click(); });

el.timeInput.addEventListener("change", () => {
  if (!S.running && S.elapsed === 0) { S.limitSecs = parseInt(el.timeInput.value||30)*60; updateTimer(); }
});

/* ---- init ---- */
updateTimer();
render();
</script>
</body>
</html>
